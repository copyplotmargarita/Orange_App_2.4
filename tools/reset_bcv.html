<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reset Tasa BCV - Orange App</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 450px; border: 1px solid #334155; }
        h1 { color: #f59e0b; margin-bottom: 1rem; }
        p { color: #94a3b8; line-height: 1.5; margin-bottom: 2rem; }
        .btn { background: #f59e0b; color: white; border: none; padding: 1rem 2rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; width: 100%; }
        .btn:hover { background: #d97706; transform: scale(1.02); }
        #log { margin-top: 1.5rem; text-align: left; font-family: monospace; font-size: 0.85rem; max-height: 150px; overflow-y: auto; background: #0f172a; padding: 1rem; border-radius: 0.5rem; color: #10b981; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔄 Reset Tasa BCV</h1>
        <p>Esta herramienta eliminará el registro de la tasa BCV de <strong>hoy</strong> en la base de datos y en tu navegador para que puedas probar la nueva lógica.</p>
        
        <button id="resetBtn" class="btn">BORRAR TASA DE HOY</button>
        
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD9aam0cysVQgVDi3pMHu-tP7johs7aeI0",
          authDomain: "app-ventas-db.firebaseapp.com",
          projectId: "app-ventas-db",
          storageBucket: "app-ventas-db.firebasestorage.app",
          messagingSenderId: "767590061980",
          appId: "1:767590061980:web:0631a07b64fa943e0ada59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const resetBtn = document.getElementById('resetBtn');
        const log = document.getElementById('log');

        const writeLog = (msg) => {
            log.style.display = 'block';
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        };

        resetBtn.onclick = async () => {
            const businessId = localStorage.getItem('businessId');
            const todayStr = new Date().toISOString().split('T')[0];

            if (!businessId) {
                alert("Error: No se encontró businessId. Inicia sesión en la app primero.");
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerHTML = "Procesando...";

            try {
                // 1. Borrar de LocalStorage
                writeLog("Limpiando LocalStorage...");
                localStorage.removeItem('bcvRate');
                localStorage.removeItem('bcvDate');

                // 2. Borrar de Firestore
                writeLog(`Buscando registro en Firebase para ${todayStr}...`);
                await deleteDoc(doc(db, "businesses", businessId, "bcv_history", todayStr));
                writeLog("✅ Registro eliminado de la base de datos.");

                writeLog("✅ TODO LISTO. Ahora puedes volver al Dashboard.");
                resetBtn.innerHTML = "¡Completado!";
                
                alert("Tasa de hoy eliminada. Regresa al Dashboard y recarga para probar.");
            } catch (error) {
                writeLog("❌ ERROR: " + error.message);
                resetBtn.disabled = false;
                resetBtn.innerHTML = "REINTENTAR";
            }
        };
    </script>
</body>
</html>
