<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Limpieza de Base de Datos - Orange App</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; max-width: 450px; border: 1px solid #334155; }
        h1 { color: #f87171; margin-bottom: 1rem; }
        p { color: #94a3b8; line-height: 1.5; margin-bottom: 2rem; }
        .btn { background: #ef4444; color: white; border: none; padding: 1rem 2rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; width: 100%; }
        .btn:hover { background: #dc2626; transform: scale(1.02); }
        .btn:disabled { background: #475569; cursor: not-allowed; }
        #log { margin-top: 1.5rem; text-align: left; font-family: monospace; font-size: 0.85rem; max-height: 150px; overflow-y: auto; background: #0f172a; padding: 1rem; border-radius: 0.5rem; color: #10b981; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚠️ Zona de Peligro</h1>
        <p>Esta herramienta eliminará permanentemente todos los registros de <strong>Empleados</strong> y <strong>Turnos (Sesiones)</strong> asociados a tu negocio actual.<br><br>Esto es necesario para limpiar datos de versiones anteriores.</p>
        
        <button id="cleanBtn" class="btn">EJECUTAR LIMPIEZA DEFINITIVA</button>
        
        <div id="log"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD9aam0cysVQgVDi3pMHu-tP7johs7aeI0",
          authDomain: "app-ventas-db.firebaseapp.com",
          projectId: "app-ventas-db",
          storageBucket: "app-ventas-db.firebasestorage.app",
          messagingSenderId: "767590061980",
          appId: "1:767590061980:web:0631a07b64fa943e0ada59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const cleanBtn = document.getElementById('cleanBtn');
        const log = document.getElementById('log');

        const writeLog = (msg) => {
            log.style.display = 'block';
            log.innerHTML += `> ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
        };

        cleanBtn.onclick = async () => {
            const businessId = localStorage.getItem('businessId');
            if (!businessId) {
                alert("Error: No se encontró un businessId en el localStorage. Por favor, inicia sesión en la app primero.");
                return;
            }

            if (!confirm("¿Estás absolutamente seguro? Esta acción no se puede deshacer.")) return;

            cleanBtn.disabled = true;
            cleanBtn.innerHTML = "Limpiando...";
            writeLog("Iniciando limpieza para negocio: " + businessId);

            try {
                // 1. Limpiar Empleados
                writeLog("Buscando empleados...");
                const empSnap = await getDocs(collection(db, "businesses", businessId, "employees"));
                writeLog(`Encontrados ${empSnap.size} empleados.`);
                for (const d of empSnap.docs) {
                    await deleteDoc(doc(db, "businesses", businessId, "employees", d.id));
                    writeLog(`Eliminado empleado: ${d.id}`);
                }

                // 2. Limpiar Sesiones
                writeLog("Buscando turnos/sesiones...");
                const sessSnap = await getDocs(collection(db, "businesses", businessId, "sessions"));
                writeLog(`Encontrados ${sessSnap.size} turnos.`);
                for (const d of sessSnap.docs) {
                    await deleteDoc(doc(db, "businesses", businessId, "sessions", d.id));
                    writeLog(`Eliminado turno: ${d.id}`);
                }

                writeLog("✅ LIMPIEZA COMPLETADA CON ÉXITO.");
                cleanBtn.innerHTML = "Limpieza Completada";
                alert("La base de datos de Empleados y Turnos ha sido limpiada.");
            } catch (error) {
                writeLog("❌ ERROR: " + error.message);
                console.error(error);
                cleanBtn.disabled = false;
                cleanBtn.innerHTML = "REINTENTAR LIMPIEZA";
            }
        };
    </script>
</body>
</html>
